<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawUI — min example</title>

  <link rel="stylesheet" href="../../dist/drawui.min.css">
  <link rel="stylesheet" href="../../styles/themes/dark.css">
  <link rel="stylesheet" href="../../styles/themes/light.css">
  <link rel="stylesheet" href="../examples.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      background: var(--dui-color-bg, #0a0e12);
      color: var(--dui-color-text, #e6edf3);
      font-family: var(--dui-font-ui, system-ui, sans-serif);
    }

    #app {
      min-height: 100%;
      padding: 1.5rem;
    }

    .demo-note {
      max-width: 36rem;
      margin-bottom: 1rem;
      color: var(--dui-color-text-muted, #b9c2b6);
      font-size: 0.875rem;
      line-height: 1.5;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "drawui": "../../dist/drawui.min.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <p class="demo-note">
      Min DrawUI demo — loads from <code>dist/</code>. Run <code>npm run build</code> first, then serve the <code>docs/</code> folder:
      <code>npx serve docs -p 5173</code>
    </p>
  </div>

  <script type="module">
    import {
      Markdown,
      FloatingWindow,
      StackPanel,
      Heading,
      TextBlock,
      Button,
    } from "drawui";

    const panel = new FloatingWindow({
      title: "DrawUI Min",
      position: "right",
      width: "320px",
    });

    const content = new StackPanel({ isVertical: true })
      .gap("0.75rem")
      .add(new Heading(3, "Hello DrawUI"))
      .add(new TextBlock("Panels, primitives, and basic markdown — zero peer packages."))
      .add(
        new Markdown(
          "## Markdown works\n\nBuilt-in converter: **bold**, *italic*, and `code`.\n\n- No Showdown\n- No Highlight.js",
        ),
      )
      .add(
        new StackPanel({ isVertical: false })
          .gap("0.5rem")
          .add(
            new Button("Primary").addClass("primary").onClick(() => {
              alert("DrawUI min build");
            }),
          )
          .add(new Button("Secondary").addClass("secondary")),
      );

    panel.setContent(content);
    document.body.appendChild(panel.dom);
    panel.show();
  </script>
</body>
</html>
