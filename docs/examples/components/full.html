<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawUI — full component reference</title>

  <link rel="stylesheet" href="../../dist/drawui.full.css">
  <link rel="stylesheet" href="../../styles/themes/dark.css">
  <link rel="stylesheet" href="../../styles/themes/light.css">
  <link rel="stylesheet" href="../../styles/components/nodes.css">
  <link rel="stylesheet" href="../../styles/components/hud.css">
  <link rel="stylesheet" href="../../styles/components/pie-menu.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.1/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.1/styles/ag-theme-quartz.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsgantt-improved@2.8.10/dist/jsgantt.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css">
  <link rel="stylesheet" href="../spa-host.css">
  <link rel="stylesheet" href="./gallery.css">

  <!-- Local full build from docs/dist/ + peer CDN URLs (see docs/dist/importmap.full.json). -->
  <script type="importmap">
  {
    "imports": {
      "drawui": "../../dist/drawui.full.js",
      "chart.js/auto": "https://cdn.jsdelivr.net/npm/chart.js@4.4.7/auto/+esm",
      "ag-grid-community": "https://cdn.jsdelivr.net/npm/ag-grid-community@35.2.1/dist/package/main.esm.mjs",
      "jsgantt-improved": "https://cdn.jsdelivr.net/npm/jsgantt-improved@2.8.10/+esm",
      "showdown": "https://cdn.jsdelivr.net/npm/showdown@2.1.0/+esm",
      "@highlightjs/cdn-assets/es/highlight.min.js": "https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/es/highlight.min.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { mountGallery } from "./gallery.js";

    mountGallery(document.getElementById("app"), { build: "full" }).catch((error) => {
      const app = document.getElementById("app");
      app.innerHTML = `
        <div style="padding:2rem;font-family:system-ui,sans-serif;max-width:40rem">
          <h1 style="margin:0 0 0.5rem">Gallery failed to load</h1>
          <p style="color:#b9c2b6">${error.message}</p>
          <p style="color:#b9c2b6">Run <code>npm run build</code> from the repo root, then reload.</p>
        </div>`;
      console.error(error);
    });
  </script>
</body>
</html>
