<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawUI — min component reference</title>

  <link rel="stylesheet" href="../../dist/drawui.min.css">
  <link rel="stylesheet" href="../../styles/themes/dark.css">
  <link rel="stylesheet" href="../../styles/themes/light.css">
  <link rel="stylesheet" href="../spa-host.css">
  <link rel="stylesheet" href="./gallery.css">

  <script type="importmap">
  {
    "imports": {
      "drawui": "../../dist/drawui.min.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { mountGallery } from "./gallery.js";

    mountGallery(document.getElementById("app"), { build: "min" }).catch((error) => {
      const app = document.getElementById("app");
      app.innerHTML = `
        <div style="padding:2rem;font-family:system-ui,sans-serif;max-width:40rem">
          <h1 style="margin:0 0 0.5rem">Gallery failed to load</h1>
          <p style="color:#b9c2b6">${error.message}</p>
          <p style="color:#b9c2b6">Run <code>npm run build</code> from the repo root, then reload.</p>
        </div>`;
      console.error(error);
    });
  </script>
</body>
</html>
